<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Loan Evaluator</title>
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold mb-4">Student Loan Evaluator</h1>
    <form id="loanForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Loan Type</label>
        <select id="loanType" class="mt-1 block w-full bg-white border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          <option value="private">Private Loan</option>
          <option value="public_subsidized">Public Subsidized Loan</option>
          <option value="public_unsubsidized">Public Unsubsidized Loan</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Interest Rate (%)</label>
        <input type="number" id="interestRate" step="0.01" class="mt-1 block w-full bg-white border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Repayment Period (years)</label>
        <input type="number" id="repaymentPeriod" class="mt-1 block w-full bg-white border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Expected Salary (annual)</label>
        <input type="number" id="expectedSalary" class="mt-1 block w-full bg-white border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Current Debt</label>
        <input type="number" id="currentDebt" class="mt-1 block w-full bg-white border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Future Borrowing Needs</label>
        <input type="number" id="futureBorrowing" class="mt-1 block w-full bg-white border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
      <div class="flex justify-end">
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none">Evaluate</button>
      </div>
    </form>
    <div id="results" class="mt-6 hidden">
      <!-- Results will be displayed here -->
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
